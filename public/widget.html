<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Snack Stall · Status Widget</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body style="background:transparent;">
    <div class="card" style="max-width:320px;">
      <div class="card-header">
        <div class="card-title">Stall status</div>
        <span class="badge" id="widget-status-pill">Checking…</span>
      </div>
      <div style="font-size:13px;color:var(--text-muted);" id="widget-body">
        Live status and queue length will appear here.
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="widget.js"></script>
  </body>
</html>
