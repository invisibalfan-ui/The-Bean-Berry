<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>The Bean & Berry · Track Order</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="background-orbit orbit-1"></div>
    <div class="background-orbit orbit-2"></div>
    <div class="background-orbit orbit-3"></div>

    <!-- Desktop nav -->
    <header class="top-nav">
      <div class="nav-left">
        <div class="logo-mark">SB</div>
        <div class="nav-title">
          <div class="nav-name">Track Order</div>
          <div class="nav-subtitle">Live status & QR</div>
        </div>
      </div>
      <nav class="nav-links">
        <a href="index.html">Orders</a>
        <a href="bean.html">Kitchen</a>
        <a href="items.html">Items</a>
        <a href="track.html">Track</a>
      </nav>
    </header>

    <div class="page-shell">
      <main class="main-layout">
        <div class="page-header">
          <div class="page-title-block">
            <h1>Check your order status</h1>
            <p>Enter your order number or scan your QR code.</p>
          </div>
        </div>

        <div class="grid-2">
          <!-- Search -->
          <section class="card">
            <div class="card-header">
              <div class="card-title">Find your order</div>
            </div>

            <div class="form-grid">
              <div class="form-row">
                <label class="label">Order number</label>
                <input id="track-id" class="input" placeholder="e.g. 42" />
              </div>
            </div>

            <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">
              <button id="track-btn" class="btn btn-primary">Track order</button>
              <button id="track-clear" class="btn btn-ghost">Clear</button>
            </div>

            <p id="track-error" style="margin-top:10px;font-size:12px;color:var(--danger);display:none;">
              Order not found. Check the number and try again.
            </p>
          </section>

          <!-- Status -->
          <section class="card">
            <div class="card-header">
              <div class="card-title">Status</div>
              <span id="track-status-pill" class="status-pill new" style="display:none;"></span>
            </div>

            <div id="track-details" style="font-size:13px;color:var(--text-muted);">
              Enter an order number to see details here.
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- Mobile nav -->
    <nav class="mobile-nav">
      <a href="index.html" class="mobile-nav-item"><span class="icon">🏠</span><span class="label">Order</span></a>
      <a href="bean.html" class="mobile-nav-item"><span class="icon">🍳</span><span class="label">Kitchen</span></a>
      <a href="items.html" class="mobile-nav-item"><span class="icon">📦</span><span class="label">Items</span></a>
      <a href="track.html" class="mobile-nav-item"><span class="icon">📍</span><span class="label">Track</span></a>
    </nav>

    <script src="/socket.io/socket.io.js"></script>
    <script src="track.js"></script>
  </body>
</html>
