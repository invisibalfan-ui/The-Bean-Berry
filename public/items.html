<!-- items.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover" />
    <title>Snack Stall · Items</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background-orbit orbit-1"></div>
    <div class="background-orbit orbit-2"></div>
    <div class="background-orbit orbit-3"></div>

    <header class="top-nav">
      <div class="nav-left">
        <div class="logo-mark">SB</div>
        <div class="nav-title">
          <div class="nav-name">Item Manager</div>
          <div class="nav-subtitle">Menu, stock & visibility</div>
        </div>
      </div>
      <nav class="nav-links">
        <a href="index.html">Orders</a>
        <a href="bean.html">Kitchen</a>
        <a href="items.html">Items</a>
        <a href="track.html">Track</a>
      </nav>
    </header>

    <div class="page-shell">
      <main class="main-layout">
        <div class="page-header">
          <div class="page-title-block">
            <h1>Menu & inventory</h1>
            <p>Control what’s available, pricing, and stock levels.</p>
          </div>
          <button id="add-item-btn" class="btn btn-primary">Add item</button>
        </div>

        <section class="card">
          <table class="table" id="items-table">
            <thead>
              <tr><th>Item</th><th>Category</th><th>Price</th><th>Stock</th><th>Flags</th><th></th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>

        <section class="card" style="margin-top:18px;">
          <div class="card-header"><div class="card-title">Edit item</div><span class="badge">Select an item or add new</span></div>
          <div class="form-grid">
            <div class="form-row"><label class="label">Name</label><input id="item-name" class="input" /></div>
            <div class="form-row"><label class="label">Category</label><input id="item-category" class="input" /></div>
            <div class="form-row"><label class="label">Price</label><input id="item-price" type="number" step="0.01" class="input" /></div>
            <div class="form-row"><label class="label">Stock</label><input id="item-stock" type="number" class="input" /></div>
            <div class="form-row"><label class="label">Image</label><input id="item-image" type="file" accept="image/*" class="input" /><img id="item-image-preview" class="item-image-preview" style="display:none;" /></div>
          </div>

          <div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;">
            <button id="delete-item" class="btn btn-ghost">Delete</button>
            <button id="save-item" class="btn btn-primary">Save changes</button>
          </div>
        </section>
      </main>
    </div>

    <button class="fab" id="fab-add">＋</button>

    <nav class="mobile-nav">
      <a href="index.html" class="mobile-nav-item"><span class="icon">🏠</span><span class="label">Order</span></a>
      <a href="bean.html" class="mobile-nav-item"><span class="icon">🍳</span><span class="label">Kitchen</span></a>
      <a href="items.html" class="mobile-nav-item"><span class="icon">📦</span><span class="label">Items</span></a>
      <a href="track.html" class="mobile-nav-item"><span class="icon">📍</span><span class="label">Track</span></a>
    </nav>

    <script src="/socket.io/socket.io.js"></script>
    <script src="items.js"></script>
    <script src="mobile.js"></script>
  </body>
</html>
